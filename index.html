<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratory Status: Beset</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #00ff41; /* Classic Terminal Green */
            --accent-color: #333;
            --font-main: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            border: 1px solid var(--accent-color);
            padding: 2rem;
            max-width: 500px;
            position: relative;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
        }

        /* Scanning Line Effect */
        .container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 65, 0.3);
            animation: scan 4s linear infinite;
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        p {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #888;
        }

        .status-msg {
            margin: 20px 0;
            padding: 10px;
            border-left: 3px solid var(--text-color);
            background: #111;
            display: inline-block;
        }

        .link-alt {
            display: inline-block;
            margin-top: 20px;
            color: var(--text-color);
            text-decoration: none;
            border: 1px solid var(--text-color);
            padding: 10px 20px;
            transition: all 0.3s ease;
        }

        .link-alt:hover {
            background: var(--text-color);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--text-color);
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .glitch {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="glitch">Access Restricted</h1>
        <div class="status-msg">
            STATUS: LAB BESET / INDEX OFFLINE
        </div>
        <p>
            The primary laboratory registry is currently undergoing structural recalibration. 
            Automated systems are offline to prevent data corruption.
        </p>
        
        <p>Please utilize the secondary mirror for specimen access:</p>
        
        <a href="https://machinetouched.w3spaces.com" class="link-alt">
            ACTIVATE SECONDARY MIRROR &gt;
        </a>
    </div>

</body>
</html>
