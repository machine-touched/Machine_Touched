<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine Touched | Master Registry</title>
    <style>
        :root {
            --bg-color: #050808;
            --icy-green: #00ffcc;
            --glow-strength: 0 0 15px rgba(0, 255, 204, 0.6);
            --text-color: #f0fdfa;
            --grid-gap: 15px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 20px;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            color: var(--icy-green);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 0;
        }

        .registry-info {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 10px;
        }

        #master-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: var(--grid-gap);
            width: 100%;
            max-width: 1200px;
        }

        .specimen-link {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #333;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.3s ease;
            font-size: 0.8rem;
            position: relative;
            overflow: hidden;
        }

        .specimen-link:hover {
            border-color: var(--icy-green);
            background-color: rgba(0, 255, 65, 0.1);
            color: var(--icy-green);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }

        .specimen-link::before {
            content: "ID: ";
            font-size: 0.6rem;
            opacity: 0.5;
        }

        footer {
            margin-top: 50px;
            font-size: 0.7rem;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <header>
        <h1>Machine Touched</h1>
        <div class="registry-info">DIGITAL LABORATORY // SPECIMEN REGISTRY // <a href="https://machinetouched.w3spaces.com/">Machine Touched</a></div>
    </header>

    <main id="master-grid">
        </main>

    <footer>
        &copy; 2026 MACHINE TOUCHED CORE. ALL SPECIMENS LOGGED.
    </footer>

  <script>
        const grid = document.getElementById('master-grid');
        const totalSpecimens = 2147483647;
        const aiNodeIndex = 2147483647; 
        for (let i = 1; i <= totalSpecimens; i++) {
            const link = document.createElement('a');
            link.href = `./Specimens/Specimen-${i}/index.html`;
            link.target = "_blank"; // Opens in new tab
            link.rel = "noopener";   // Best practice for performance/security
            link.className = 'specimen-link';
            
            const id = i.toString().padStart(3, '0');
            link.innerHTML = `
                <span class="specimen-tag">node</span>
                <span class="specimen-id">${id}</span>
            `;
            
            grid.appendChild(link);
        }
    </script>
</body>
</html>
